site_name: Merchello Documentation
site_description: Enterprise ecommerce for Umbraco v17+ — developer documentation
site_url: https://YodasMyDad.github.io/Merchello/
repo_url: https://github.com/YodasMyDad/Merchello
repo_name: YodasMyDad/Merchello
edit_uri: edit/main/docs/documentation/

docs_dir: docs/documentation

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/YodasMyDad/Merchello
    - icon: fontawesome/solid/box
      link: https://www.nuget.org/packages/Umbraco.Community.Merchello

